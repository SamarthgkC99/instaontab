<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Instagram Proxy</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 0;
      background: #fafafa;
    }
    #toolbar {
      position: sticky;
      top: 0;
      background: #fff;
      padding: 10px;
      border-bottom: 1px solid #dbdbdb;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      z-index: 10;
    }
    #urlInput {
      flex: 1;
      padding: 8px;
      font-size: 14px;
      border: 1px solid #dbdbdb;
      border-radius: 4px;
    }
    button {
      background: #0095f6;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
    }
    #frameContainer {
      height: calc(100vh - 60px);
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .info {
      text-align: center;
      padding: 20px;
      color: #8e8e8e;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <input type="text" id="urlInput" placeholder="Instagram URL (e.g., /proxy/https://www.instagram.com/)" value="/proxy/https://www.instagram.com/">
    <button id="goBtn">Go</button>
    <button id="homeBtn">Home</button>
  </div>
  <div id="frameContainer">
    <iframe id="proxyFrame" src="/proxy/https://www.instagram.com/"></iframe>
  </div>

  <script>
    const urlInput = document.getElementById('urlInput');
    const goBtn = document.getElementById('goBtn');
    const homeBtn = document.getElementById('homeBtn');
    const proxyFrame = document.getElementById('proxyFrame');

    function loadUrl(url) {
      if (!url.startsWith('/proxy/')) {
        // If user forgot, add proxy prefix
        if (!url.startsWith('http')) url = 'https://' + url;
        url = '/proxy/' + url.replace(/^https?:\/\//, '');
      }
      proxyFrame.src = url;
    }

    goBtn.addEventListener('click', () => {
      loadUrl(urlInput.value);
    });
    homeBtn.addEventListener('click', () => {
      proxyFrame.src = '/proxy/https://www.instagram.com/';
      urlInput.value = '/proxy/https://www.instagram.com/';
    });
    // Enter key
    urlInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loadUrl(urlInput.value);
    });
  </script>
</body>
</html>
